# Append to ~/.config/yazi/keymap.toml

[[mgr.prepend_keymap]]
on = ["c", "s"]
run = "plugin aget -- seal"
desc = "aget: seal (encrypt + delete original)"

[[mgr.prepend_keymap]]
on = ["c", "k"]
run = "plugin aget -- seal-keep"
desc = "aget: seal (encrypt + keep original)"

[[mgr.prepend_keymap]]
on = ["c", "o"]
run = "plugin aget -- open"
desc = "aget: decrypt to current dir"

[[mgr.prepend_keymap]]
on = ["c", "p"]
run = "plugin aget -- peek"
desc = "aget: peek (decrypt, view, auto-delete)"

[[mgr.prepend_keymap]]
on = ["c", "d"]
run = "plugin aget -- destroy"
desc = "aget: securely destroy file"
