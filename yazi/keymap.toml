# Append to ~/.config/yazi/keymap.toml

[[mgr.prepend_keymap]]
on = ["c", "s"]
run = "plugin aget -- seal"
desc = "aget: seal (encrypt) file"

[[mgr.prepend_keymap]]
on = ["c", "o"]
run = "plugin aget -- open"
desc = "aget: open (decrypt) .age file"

[[mgr.prepend_keymap]]
on = ["c", "d"]
run = "plugin aget -- destroy"
desc = "aget: securely destroy file"
